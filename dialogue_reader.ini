; Dialogue Reader hotkey & network configuration.
;
; After editing, right-click the tray icon -> Reload Script (or restart the
; AHK script) for changes to take effect.
;
; AHK key syntax cheatsheet:
;
;   Modifiers (combine with any key, no space):
;     +KEY    Shift + KEY    e.g.  +F6     = Shift + F6
;     ^KEY    Ctrl  + KEY    e.g.  ^d      = Ctrl + D
;     !KEY    Alt   + KEY    e.g.  !PgDn   = Alt + PageDown
;     #KEY    Win   + KEY    e.g.  #space  = Win + Space
;   Modifiers stack: ^!d = Ctrl+Alt+D, ^+End = Ctrl+Shift+End.
;
;   Common key names:
;     F1 .. F24                       function keys
;     a .. z, 0 .. 9                  letters and digits
;     Space, Enter, Tab, Esc, Backspace
;     PageUp / PgUp, PageDown / PgDn
;     Home, End, Insert / Ins, Delete / Del
;     Up, Down, Left, Right           arrow keys
;     CapsLock, NumLock, ScrollLock
;     PrintScreen, Pause, AppsKey
;     Numpad0..Numpad9, NumpadEnter, NumpadAdd, NumpadSub, NumpadMult, NumpadDiv
;
; Full reference: https://www.autohotkey.com/docs/v2/KeyList.htm

[Hotkeys]
PickRegion=F1
PickSpeakerRegion=^F1
ClearRegions=+F1
SpeedDown=PgDn
SpeedUp=PgUp
TogglePause=End
CycleVoice=F2
; CycleVoicePrev steps backward through the voice pool. Useful when
; you've cycled past a voice you wanted; just step back to it.
CycleVoicePrev=^F2
; SetSpeaker pops up an input box where you type the current speaker's
; name. Use this when OCR can't read the in-game name UI (stylized
; fonts, tilted bubbles, etc).

[Network]
; Must match the port main.py listens on (DEFAULT_PORT in command_server.py).
Host=127.0.0.1
Port=7849

[Polling]
; How many consecutive polls must return the SAME dialogue-region OCR text
; before the line is accepted and spoken. Higher = more stable but slower
; to react. Prevents reading partial typewriter text. 1 disables the check.
; Polls are ~100ms apart, so TextConfirmPolls=3 adds ~200ms to each read.
TextConfirmPolls=3

[Launcher]
; Hide the Python console window when dialogue_reader.ahk launches main.py.
; Set to false to see live debug output (or run `py main.py --debug` directly).
HideConsole=false

[Voices]
; Default voice used when no speaker is currently set.
; Format: engine:voice_name.  engine = piper | kokoro.
; Bare names (no colon) default to piper: for backward compatibility.
Default=piper:en_US-amy-medium

; Round-robin pool for speaker auto-assignment AND for the CycleVoice
; hotkeys. Order matters. Mix engines freely.
;
; Kokoro voices (Apache 2.0, natural, ~350ms/sent CPU, shares ~310MB model):
;   af_heart, af_bella, af_sarah        (US female)
;   am_michael, am_adam                 (US male)
;   bf_emma                             (British female)
;   bm_george                           (British male)
;
; Piper voices (fast, ~60 MB per voice):
;   en_US-amy-medium, en_US-ryan-medium, en_US-lessac-medium,
;   en_US-lessac-high, en_US-hfc_female-medium, en_US-hfc_male-medium,
;   en_US-joe-medium,
;   en_GB-alan-medium, en_GB-alba-medium, en_GB-jenny_dioco-medium,
;   en_GB-northern_english_male-medium
Pool=kokoro:af_heart,piper:en_US-lessac-high,kokoro:am_michael,piper:en_US-hfc_female-medium,kokoro:bf_emma,piper:en_GB-alan-medium,kokoro:am_adam,piper:en_US-ryan-medium
