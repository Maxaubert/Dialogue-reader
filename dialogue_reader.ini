; Dialogue Reader config. Right-click tray -> Reload Script to apply changes.
; AHK key syntax: +=Shift, ^=Ctrl, !=Alt, #=Win. Ref: https://www.autohotkey.com/docs/v2/KeyList.htm

[Hotkeys]
PickRegion=F1
PickSpeakerRegion=^F1
ClearRegions=+F1
SpeedDown=PgDn
SpeedUp=PgUp
TogglePause=End
CycleVoice=F2
CycleVoicePrev=^F2

[Network]
Host=127.0.0.1
Port=7849

[Polling]
; Consecutive identical OCR polls required before speaking. Prevents partial typewriter reads.
TextConfirmPolls=3

[Launcher]
HideConsole=false

[Voices]
; Voice string format: <engine>:<id>   (engine = piper | kokoro | sherpa)
; Sherpa has a sub-model: sherpa:<model>:<speaker_id>  e.g. sherpa:vctk:0
; Bare names (no colon) default to piper:.
;
; Shorthand (auto-expanded in the Pool):
;   piper:all                     — every curated Piper voice
;   kokoro:all                    — every Kokoro English voice
;   sherpa:<model>:all            — every speaker id for that sherpa model
;   sherpa:<model>:<start>-<end>  — inclusive range of speaker ids
; Ranges work only for sherpa (integer ids). piper/kokoro have named voices,
; so use :all or spell names out.
;
; Voice catalogs (browse these to pick specific voices):
;   docs/voices/piper.csv
;   docs/voices/kokoro.csv
;   docs/voices/sherpa_vctk.csv
;   docs/voices/sherpa_libritts_r.csv
;   docs/voices/sherpa_melo_en.csv

Default=kokoro:af_heart

; Voice pool. New speakers get a random voice from this pool (assignment
; persists in speakers.json). CycleVoice hotkeys walk the pool linearly.
Pool=piper:all,kokoro:all,sherpa:vctk:all,sherpa:melo_en:all,sherpa:libritts_r:all
