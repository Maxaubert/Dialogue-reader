; Dialogue Reader config. Right-click tray -> Reload Script to apply changes.
; AHK key syntax: +=Shift, ^=Ctrl, !=Alt, #=Win. Ref: https://www.autohotkey.com/docs/v2/KeyList.htm

[Hotkeys]
PickRegion=F1
PickSpeakerRegion=^F1
ClearRegions=+F1
SpeedDown=PgDn
SpeedUp=PgUp
TogglePause=End
CycleVoice=F2
CycleVoicePrev=^F2

[Network]
Host=127.0.0.1
Port=7849

[Polling]
; Consecutive identical OCR polls required before speaking. Prevents partial typewriter reads.
TextConfirmPolls=3

[Launcher]
HideConsole=false

[Voices]
; Format: engine:voice_name (engine = piper | kokoro | sherpa). Bare names default to piper:.
; Sherpa voices use nested format: sherpa:<model>:<speaker_id> e.g. sherpa:vctk:0.
Default=sherpa:vctk:0

; Round-robin pool. Ordered F/M alternating by official grade (best → worst).
; Females outnumber males, so the last two entries are female-only.
;
; Kokoro voices (Apache 2.0, ~350ms/sent CPU, shares ~310MB model):
;   American Female: af_heart, af_bella, af_nicole, af_aoede, af_kore,
;                    af_sarah, af_alloy, af_nova, af_sky, af_jessica, af_river
;   American Male:   am_fenrir, am_michael, am_puck, am_echo, am_eric,
;                    am_liam, am_onyx, am_santa, am_adam
;   British Female:  bf_emma, bf_isabella, bf_alice, bf_lily
;   British Male:    bm_fable, bm_george, bm_lewis, bm_daniel
;
; Piper voices (fast, ~60 MB each; -high variants ~110 MB):
;   en_US-amy-medium, en_US-ryan-high, en_US-ljspeech-high (F, warm narration),
;   en_US-hfc_female-medium, en_US-hfc_male-medium,
;   en_US-norman-medium (M, LibriVox 15.5h),
;   en_GB-alan-medium, en_GB-alba-medium, en_GB-cori-high (F, British),
;   en_GB-jenny_dioco-medium, en_GB-northern_english_male-medium,
;   en_GB-semaine-medium (multi-char dialogue corpus)
;
; Sherpa-ONNX VCTK voices (Apache-2.0, 109 British speakers, ~145MB shared model):
;   sherpa:vctk:<id> where id is 0-108.
;   Confirmed-good picks: sherpa:vctk:0, sherpa:vctk:30.
;
