; Dialogue Reader config. Right-click tray -> Reload Script to apply changes.
; AHK keys: +=Shift ^=Ctrl !=Alt #=Win  (https://www.autohotkey.com/docs/v2/KeyList.htm)

[Hotkeys]
PickRegion=F1
PickSpeakerRegion=^F1
ClearRegions=+F1
SpeedDown=PgDn
SpeedUp=PgUp
TogglePause=End
CycleVoice=F2
CycleVoicePrev=^F2

[Network]
Host=127.0.0.1
Port=7849

[Polling]
; Identical OCR polls required before speaking (guards against partial typewriter text).
TextConfirmPolls=2

[OCR]
; winocr = fast Windows OCR (clean UI text). easyocr = slower, better on stylized game fonts.
Dialogue=winocr
Speaker=easyocr

[Capture]
; auto (probe at pick) | screen (force mss; for flickery DX games) | window (force PrintWindow; Magnifier-stable)
Mode=auto

[Speakers]
; Voice auto-assignment order: random | round_robin | inverse_round_robin
AssignmentStrategy=round_robin

[Magnifier]
SkipWhenZoomed=true

[Launcher]
HideConsole=false

[Voices]
; Voices are kokoro:<id> (e.g. kokoro:af_heart). Pool=kokoro:all uses the curated
; list in main.py _DEFAULT_VOICE_POOL; any of Kokoro's 28 voices also works by name.
Default=kokoro:af_heart
Pool=kokoro:all
