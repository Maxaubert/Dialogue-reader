; Dialogue Reader config. Right-click tray -> Reload Script to apply changes.
; AHK key syntax: +=Shift, ^=Ctrl, !=Alt, #=Win. Ref: https://www.autohotkey.com/docs/v2/KeyList.htm

[Hotkeys]
PickRegion=F1
PickSpeakerRegion=^F1
ClearRegions=+F1
SpeedDown=PgDn
SpeedUp=PgUp
TogglePause=End
CycleVoice=F2
CycleVoicePrev=^F2

[Network]
Host=127.0.0.1
Port=7849

[Polling]
; Consecutive identical OCR polls required before speaking. Prevents partial typewriter reads.
TextConfirmPolls=1

[OCR]
;   winocr  — Windows native OCR (WinRT). Fast, great on clean UI text, uses dictionar4y matching.
;   easyocr — EasyOCR (CPU). Slower, more accurate on stylized game fonts, is purely visual, often better for things like character names.
Dialogue=winocr
Speaker=easyocr

[Capture]
; How to grab pixels from the game window. Valid values: auto | screen | window
;   auto   — default. Probes PrintWindow at region-pick time. Fast window
;            (<50ms) → WINDOW mode, slow → SCREEN mode with occasional
;            PrintWindow fallback. Best for most apps.
;   screen — force mss screen capture, never call PrintWindow. Blink-free
;            on DirectX games (e.g. Persona 4) that visibly flicker when
;            PrintWindow forces a redraw. Breaks Windows Magnifier immunity.
;   window — force PrintWindow on every poll, even if slow. Needed if you
;            rely on the Magnifier overlay for zoom-stable capture.

;Recommended: auto
;(dx9 shuld use screen)
Mode=screen

[Speakers]
;   random
;   round_robin
;   inverse_round_robin

AssignmentStrategy=random

[Launcher]
HideConsole=false

[Voices]
; --- Voice string format ---------------------------------------------------
;   <engine>:<id>              (engine = piper | kokoro | sherpa)
;   sherpa has sub-models:     sherpa:<model>:<speaker_id>
;   Bare names (no colon) default to piper:.
;
; --- Sherpa models available ----------------------------------------------
;   vctk          — 109 British speakers (ids 0-108)
;   libritts_r    — 904 US speakers     (ids 0-903)
;   melo_en       — 1 narrator voice    (id 0 only)
;
; --- Single-voice examples (copy-paste ready) -----------------------------
;   piper:en_US-amy-medium        — a specific Piper voice by name
;   kokoro:af_heart               — a specific Kokoro voice by name
;   sherpa:vctk:30                — VCTK speaker 30
;   sherpa:libritts_r:500         — LibriTTS-R speaker 500
;   sherpa:melo_en:0              — the MeloTTS English narrator
;
; --- Shorthand (auto-expanded in Pool) ------------------------------------
;   piper:all                     — every Piper voice in docs/voices/piper.csv
;   kokoro:all                    — all 28 Kokoro voices
;   sherpa:vctk:all               — all 109 VCTK speakers
;   sherpa:libritts_r:all         — all 904 LibriTTS-R speakers
;   sherpa:melo_en:all            — the 1 MeloTTS voice
;
; --- Range syntax (sherpa only — numeric ids) -----------------------------
;   sherpa:vctk:0-20              — VCTK speakers 0 through 20 (21 voices)
;   sherpa:libritts_r:100-199     — LibriTTS-R speakers 100-199 (100 voices)
;   sherpa:libritts_r:870-900     — last chunk of LibriTTS-R
;
; Ranges do NOT work for piper / kokoro (names, not numbers). Use :all.
;
; --- Mix everything in one Pool line --------------------------------------
;   Pool=kokoro:af_heart,sherpa:vctk:0-20,sherpa:melo_en:0,piper:all
;
; Browse full voice lists in: docs/voices/*.csv

Default=kokoro:af_heart

Pool=kokoro:all
